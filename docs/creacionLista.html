<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/normalize.css" />
    <link rel="stylesheet" href="css/variables.css" />
    <link rel="stylesheet" href="css/common.css" />
    <link rel="stylesheet" href="css/header.css" />
    <link rel="stylesheet" href="css/frontpage/introduction.css">
    <link rel="stylesheet" href="css/frontpage/aboutus.css" />
    <link rel="stylesheet" href="css/frontpage/listademo.css">
    <link rel="stylesheet" href="css/create-list.css">
    <link rel="stylesheet" href="css/footer.css" />

    <link rel="icon" type="image/png" sizes="32x32" href="/fotos/favicon/favicon-32x32.png">
    <link rel="apple-touch-icon" sizes="180x180"  href="/fotos/favicon/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="192x192" href="/fotos/favicon/android-chrome-192x192.png">

    <meta name="title" content="FeelWatch - Creating List">
    <meta name="description" content="Does the genre on the platforms not fit your mood? Find what fits your feelings here or, even better, create it!">

    <meta property="og:type" content="website">
    <meta property="og:url" content="https://feelwatch.netlify.app/">
    <meta property="og:title" content="FeelWatch - Creating List">
    <meta property="og:image" content="https://raw.githubusercontent.com/JorgeBar/FeelWatch/main/docs/fotos/mood2Agrandada1200x600.jpg">
    <meta property="og:description" content="Does the genre on the platforms not fit your mood? Find what fits your feelings here or, even better, create it!">


    <title>Creating List</title>
</head>
<body class="main-bg">
    <header class="header">
      <h1 class="logoName"><a  href="index.html">FeelWatch</a></h1>
        <nav class="navbar">
         <input type="checkbox" id="menu-toggle" />
        <label for="menu-toggle" class="menu-icon">
          <div class="line"></div>
          <div class="line"></div>
          <div class="line"></div>
         </label>

        <ul class="list-navbar session-nav">
        </ul>
      </nav>
    </header>
        <section class="create-list" >
          <h1>New List</h1>
  
          <form class="form" id="create-list" method="POST">
            <label class="label" for="name">Name</label>
            <input
            class="input_form" 
            type="text"
            id="title-list"
            name="name"
            autocomplete="off"
            required
            value="">
            <label class="label" for="description">Description</label>
            <textarea
            class="textarea"
            name="description" 
            id="description-list" 
            cols="30" 
            rows="10" 
            required>
            </textarea>
            <label class="label" for="tags">Tags</label>
            <input
            class="textarea"
            type="text"
            id="list-tags"
            name="tags"
            value=""
            />
            
           <button type="button" id="addMovieButton">Add Movie</button>
            <button class="form-btn" type="submit">Save list</button>

          
          </form>

        </section>
        <section id="listsCreated"></section>
        

        <section id="movie-container" class="modal hidden">
            <form class="movie form" method="post">
                <label for="name">Name</label>
                <input
                type="text"
                id="name"
                name="name"
                value=""
                placeholder=""
                required
                >
                <label for="desc">Description</label>
                <input
                type="text"
                id="desc"
                name="desc"
                value=""
                placeholder=""
                required
                >
                <label for="synop">Synopsis</label>
                <input
                type="text"
                id="synopsis"
                name="synop"
                value=""
                placeholder=""
                >
                <label for="director">Director</label>
                <input
                type="text"
                name="director"
                id="director"
                value=""
                placeholder=""
                >
                <label for="date">Date</label>
                <input
                type="number"
                id="date"
                name="date"
                value=""
                placeholder=""
                >
                <label for="photoC">Photo Carousel</label>
                <input
                type="file"
                id="photoC"
                name="photoC"
                value=""
                >
                <label for="photoP">Photo Poster</label>
                <input
                type="file"
                id="photoP"
                name="photoP"
                value=""
                >
                <label for="trailer">Movie Trailer</label>
                <input
                type="url"
                id="trailer"
                name="trailer"
                value=""
                placeholder="Introduce the url of your movie"
                >
                <button type="submit">Save Movie</button>
                <button type="button" id="closeModal">Cerrar</button>
               

            </form>

        </section>
        <div id="movies-preview"></div>

        <script type="module" src="./lists/create-list/create-list.js"></script>
</body>
</html>
