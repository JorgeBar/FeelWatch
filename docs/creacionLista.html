<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/normalize.css" />
    <link rel="stylesheet" href="css/variables.css" />
    <link rel="stylesheet" href="css/common.css" />
    <link rel="stylesheet" href="css/header.css" />
    <link rel="stylesheet" href="css/frontpage/introduction.css">
    <link rel="stylesheet" href="css/frontpage/aboutus.css" />
    <link rel="stylesheet" href="css/frontpage/listademo.css">
    <link rel="stylesheet" href="css/create-list.css">
    <link rel="stylesheet" href="css/footer.css" />
    <title>Creating List</title>
</head>
<body class="main-bg">
    <header class="header">
      <h1 class="logoName"><a  href="index.html">FeelWatch</a></h1>
      <nav class="nav">
        <ul class="list-navbar">
          <li class="list-item"><a class="link" href="index.html">Home</a></li>
          <li class="list-item hidden-btn"><a class="link" href="listas_template.html">Lists</a></li>          <li class="list-item hidden-btn"><a class="link" href="SignUp.html">SignUp</a></li>
          
        </ul>
      </nav>
    </header>
        <section class="create-list" >
          <h1>New List</h1>
  
          <form class="form" id="create-list" method="POST">
            <label class="label" for="name">Name</label>
            <input
            class="input_form" 
            type="text"
            id="title-list"
            name="name"
            autocomplete="off"
            required
            value="">
            <label class="label" for="description">Description</label>
            <textarea
            class="textarea"
            name="description" 
            id="description-list" 
            cols="30" 
            rows="10" 
            required>
            </textarea>
            <label class="label" for="tags">Tags</label>
            <input
            class="textarea"
            type="text"
            id="list-tags"
            name="tags"
            value=""
            />
            
           <button type="button" id="addMovieButton">Add Movie</button>
            <button class="form-btn" type="submit">Save list</button>

          
          </form>

        </section>
        <section id="listsCreated"></section>
        

        <section id="movie-container" class="modal hidden">
            <form class="movie form" method="post">
                <label for="name">Name</label>
                <input
                type="text"
                id="name"
                name="name"
                value=""
                placeholder=""
                required
                >
                <label for="desc">Description</label>
                <input
                type="text"
                id="desc"
                name="desc"
                value=""
                placeholder=""
                required
                >
                <label for="synop">Synopsis</label>
                <input
                type="text"
                id="synopsis"
                name="synop"
                value=""
                placeholder=""
                >
                <label for="director">Director</label>
                <input
                type="text"
                name="director"
                id="director"
                value=""
                placeholder=""
                >
                <label for="date">Date</label>
                <input
                type="number"
                id="date"
                name="date"
                value=""
                placeholder=""
                >
                <label for="photoC">Photo Carousel</label>
                <input
                type="file"
                id="photoC"
                name="photoC"
                value=""
                >
                <label for="photoP">Photo Poster</label>
                <input
                type="file"
                id="photoP"
                name="photoP"
                value=""
                >
                <label for="trailer">Movie Trailer</label>
                <input
                type="url"
                id="trailer"
                name="trailer"
                value=""
                placeholder="Introduce the url of your movie"
                >
                <button type="submit">Save Movie</button>
                <button type="button" id="closeModal">Cerrar</button>
               

            </form>

        </section>
        <div id="movies-preview"></div>

        <script type="module" src="./lists/create-list/create-list.js"></script>
</body>
</html>
