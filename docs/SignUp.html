    <link rel="apple-touch-icon" sizes="180x180"  href="/fotos/favicon/apple-touch-icon.png">

    <meta name="title" content="FeelWatch - SignUp">

    <meta property="og:type" content="website">

    <title>Sign Up</title>
  </head>
  <body  class="main-bg">
    
    
<header class="header">
      <h1 class="logoName"><a href="index.html">FeelWatch</a></h1>

      
       <nav class="navbar">
         <input type="checkbox" id="menu-toggle" />
        <label for="menu-toggle" class="menu-icon">
          <div class="line"></div>
          <div class="line"></div>
          <div class="line"></div>
         </label>

        <ul class="list-navbar">
          <li><a class="link" href="index.html">Home </a></li>
         
          <li><a class="link" href="listas_template.html">Lists</a></li>
          <li><a class="link active" href="SignUp.html">Sign Up</a></li>
          <li><a class="link hidden-btn">Lang</a></li>
          
        </ul>
      </nav>
    </header>
    <main class="card-form">
      <h1 class="matrix-prueba">Sign Up</h1>
      <form method="post" novalidate>
        <div class="form__input">
          <label for="name">Name</label>
          <input 
           type="text"
           id="username" 
           name="name" 
           placeholder="" 
           value=""
           required>
  
        </div>
        <div class="form__input">
          <label for="email">Email</label>
          <input 
          type="email" 
          id="email" 
          name="email"
          autocomplete="off"
          required 
          value="">
  
        </div>
        <div>

          <div class="form__input">
            <label for="password">Password</label>
            <input 
            type="password"
            minlength="4" 
            id="password" 
            name="password" 
            value=""
            required>
    
          </div>
          <div class="show-password">
            <button type="button"><svg class="pass-btn" xmlns="http://www.w3.org/2000/svg" height="10px" viewBox="0 -960 960 960" width="10px" fill="#e3e3e3"><path d="M602.83-377.17q50.5-50.5 50.5-122.83t-50.5-122.83q-50.5-50.5-122.83-50.5t-122.83 50.5q-50.5 50.5-50.5 122.83t50.5 122.83q50.5 50.5 122.83 50.5t122.83-50.5ZM401.5-421.5q-32.17-32.17-32.17-78.5t32.17-78.5q32.17-32.17 78.5-32.17t78.5 32.17q32.17 32.17 32.17 78.5t-32.17 78.5q-32.17 32.17-78.5 32.17t-78.5-32.17Zm-186.17 139Q96.67-365 40-500q56.67-135 175.33-217.5Q334-800 480-800t264.67 82.5Q863.33-635 920-500q-56.67 135-175.33 217.5Q626-200 480-200t-264.67-82.5ZM480-500Zm217.5 169.83q99.17-63.5 151.17-169.83-52-106.33-151.17-169.83-99.17-63.5-217.5-63.5t-217.5 63.5Q163.33-606.33 110.67-500q52.66 106.33 151.83 169.83 99.17 63.5 217.5 63.5t217.5-63.5Z"/></svg></button>
          </div>
    
        </div>
         <div class="form__input">
          <label for="password-confirm">Confirm password</label>
          <input 
          type="password"
          minlength="4" 
          id="password-confirm" 
          name="password-confirm" 
          value=""
          required>
  
        </div>
  
        <div>
          <button class="main-btn form-btn" type="submit">Create your FeelWatch account</button>
        </div>
        <hr>
        <div class="goto">
         ¿Already have an account?<br> Go to <a class="link" href="login.html">Login</a> 
        </div>
  
          
  
  
  
  
      </form>

    </main>

    <script type="module" src="./auth/register/signup.js"></script>
  </body>
</html>
