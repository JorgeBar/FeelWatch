    <main class="card-form">
      <h1 class="matrix-prueba">Sign Up</h1>
      <form method="post" novalidate>
        <div class="form__input">
          <label for="name">Name</label>
          <input 
           type="text"
           id="username" 
           name="name" 
           placeholder="" 
           value=""
           required>
  
        </div>
        <div class="form__input">
          <label for="email">Email</label>
          <input 
          type="email" 
          id="email" 
          name="email"
          autocomplete="off"
          required 
          value="">
  
        </div>
       
          
          <div class="form__input">
            <label for="password">Password</label>
            <input 
            type="password"
            minlength="4" 
            id="password"

            required>
