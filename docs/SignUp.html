    <link rel="stylesheet" href="css/footer.css" />

    <link rel="icon" type="image/png" sizes="32x32" href="/fotos/favicon/favicon-32x32.png">
    <link rel="apple-touch-icon" sizes="180x180"  href="/fotos/favicon/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="192x192" href="/fotos/favicon/android-chrome-192x192.png">

    <meta name="title" content="FeelWatch - SignUp">
    <meta name="description" content="Does the genre on the platforms not fit your mood? Find what fits your feelings here or, even better, create it!">

    <meta property="og:type" content="website">
    <meta property="og:url" content="https://feelwatch.netlify.app/">
    <meta property="og:title" content="FeelWatch - SignUp">
    <meta property="og:image" content="https://raw.githubusercontent.com/JorgeBar/FeelWatch/main/docs/fotos/mood2Agrandada1200x600.jpg">
    <meta property="og:description" content="Does the genre on the platforms not fit your mood? Find what fits your feelings here or, even better, create it!">

    <title>Sign Up</title>
  </head>
  <body  class="main-bg">
    
    
<header class="header">
      <h1 class="logoName"><a href="index.html">FeelWatch</a></h1>

      
       <nav class="navbar">
         <input type="checkbox" id="menu-toggle" />
        <label for="menu-toggle" class="menu-icon">
          <div class="line"></div>
          <div class="line"></div>
          <div class="line"></div>
         </label>

        <ul class="list-navbar">
          <li><a class="link" href="index.html">Home </a></li>
         
          <li><a class="link" href="listas_template.html">Lists</a></li>
          <li><a class="link active" href="SignUp.html">Sign Up</a></li>
          <li><a class="link hidden-btn">Lang</a></li>
          
        </ul>
      </nav>
    </header>
    <main class="card-form">
      <h1 class="matrix-prueba">Sign Up</h1>
      <form method="post" novalidate>
        <div class="form__input">
          <label for="name">Name</label>
          <input 
           type="text"
           id="username" 
           name="name" 
           placeholder="" 
           value=""
           required>
  
        </div>
        <div class="form__input">
          <label for="email">Email</label>
          <input 
          type="email" 
          id="email" 
          name="email"
          autocomplete="off"
          required 
          value="">
  
        </div>
        <div class="form__input">
          <label for="password">Password</label>
          <input 
          type="password"
          minlength="4" 
          id="password" 
          name="password" 
          value=""
          required>
  
        </div>
  
         <div class="form__input">
          <label for="password-confirm">Confirm password</label>
          <input 
          type="password"
          minlength="4" 
          id="password-confirm" 
          name="password-confirm" 
          value=""
          required>
  
        </div>
  
        <div>
          <button class="main-btn form-btn" type="submit">Create your FeelWatch account</button>
        </div>
        <hr>
        <div class="goto">
         ¿Already have an account?<br> Go to <a class="link" href="login.html">Login</a> 
        </div>
  
          
  
  
  
  
      </form>

    </main>

    <script type="module" src="./auth/register/signup.js"></script>
  </body>
</html>
