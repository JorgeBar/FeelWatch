        <section class="create-list">

          <h1>Edit List</h1>
          
          <form class="form" id="edit-list" method="POST">
            <label for="name">Name</label>
            <input 
            type="text"
            id="title-list"
            name="name"
            autocomplete="off"
            required
            value="">
            <label for="description">Description</label>
            <textarea 
            name="description" 
            id="description-list" 
            cols="30" 
            rows="10" 
            required>
            </textarea>
            <label for="tags">Tags</label>
            <input
            type="text"
            id="list-tags"
            name="tags"
            value=""
            />
            <!--<button type="submit">Añadir película</button>-->
            <button type="submit">Save List</button>
          </form>
        </section>
